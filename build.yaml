include:
  # Стандартные прошивки
  - board: xiao_ble//zmk
    shield: ergonaut_one_left
  - board: xiao_ble//zmk
    shield: ergonaut_one_right

  # Прошивки с ZMK Studio (если вам это нужно)
  - board: xiao_ble//zmk
    shield: ergonaut_one_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: ergonaut_one_left_studio
  - board: xiao_ble//zmk
    shield: ergonaut_one_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: ergonaut_one_right_studio

  # Утилита сброса настроек
  - board: xiao_ble//zmk
    shield: settings_reset
